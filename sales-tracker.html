<!DOCTYPE html>
<html lang="gu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>વેચાણ નોંધ | Sales Record</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+Gujarati:wght@400;600;700&family=Inter:wght@400;500;600;700&display=swap');

  :root {
    --green-dark: #1a6b2f;
    --green-mid: #2d8f47;
    --green-light: #e8f5ec;
    --green-accent: #3daa5c;
    --white: #ffffff;
    --gray-light: #f5f7f5;
    --gray-border: #d4e8da;
    --text-dark: #0f2d18;
    --text-mid: #3a5c44;
    --text-light: #6b8f77;
    --red: #e53935;
    --gold: #f9a825;
    --shadow: 0 2px 8px rgba(26,107,47,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Inter', 'Noto Sans Gujarati', sans-serif;
    background: var(--gray-light);
    color: var(--text-dark);
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: linear-gradient(135deg, var(--green-dark) 0%, var(--green-mid) 100%);
    color: white;
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    box-shadow: 0 3px 12px rgba(0,0,0,0.2);
    position: sticky;
    top: 0;
    z-index: 100;
  }

  .header-left h1 {
    font-size: 1.3rem;
    font-weight: 700;
    letter-spacing: -0.3px;
  }
  .header-left .date-label {
    font-size: 0.78rem;
    opacity: 0.8;
    margin-top: 2px;
  }

  .header-right {
    text-align: right;
  }
  .total-badge {
    background: rgba(255,255,255,0.15);
    border: 1.5px solid rgba(255,255,255,0.35);
    border-radius: 10px;
    padding: 6px 14px;
  }
  .total-badge .total-label {
    font-size: 0.7rem;
    opacity: 0.8;
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .total-badge .total-amount {
    font-size: 1.4rem;
    font-weight: 700;
    color: #a3ffb8;
  }

  /* TABS */
  .tabs {
    display: flex;
    background: white;
    border-bottom: 2px solid var(--gray-border);
    overflow-x: auto;
    scrollbar-width: none;
    position: sticky;
    top: 72px;
    z-index: 90;
  }
  .tabs::-webkit-scrollbar { display: none; }
  .tab-btn {
    flex: none;
    padding: 10px 18px;
    border: none;
    background: none;
    font-size: 0.82rem;
    font-weight: 500;
    color: var(--text-light);
    cursor: pointer;
    white-space: nowrap;
    border-bottom: 3px solid transparent;
    margin-bottom: -2px;
    transition: all 0.2s;
  }
  .tab-btn.active {
    color: var(--green-dark);
    border-bottom-color: var(--green-dark);
    font-weight: 700;
  }

  /* MAIN */
  main { padding: 12px 16px 100px; max-width: 800px; margin: 0 auto; }

  /* SECTION HEADER */
  .section-head {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-light);
    padding: 14px 0 6px;
    border-bottom: 1.5px solid var(--gray-border);
    margin-bottom: 8px;
  }

  /* PRODUCT CARD */
  .product-card {
    background: white;
    border-radius: 12px;
    border: 1.5px solid var(--gray-border);
    padding: 12px 14px;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 10px;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .product-card.has-qty {
    border-color: var(--green-accent);
    box-shadow: var(--shadow);
  }

  .product-name {
    flex: 1;
    min-width: 0;
  }
  .product-name .gu {
    font-size: 0.9rem;
    font-weight: 600;
    color: var(--text-dark);
    display: block;
  }
  .product-name .en {
    font-size: 0.72rem;
    color: var(--text-light);
    display: block;
    margin-top: 1px;
  }

  .variant-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
  }

  .variant-row {
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .variant-label {
    font-size: 0.68rem;
    font-weight: 600;
    color: var(--text-light);
    width: 38px;
    text-align: center;
  }

  .price-tag {
    font-size: 0.72rem;
    color: var(--green-dark);
    font-weight: 600;
    background: var(--green-light);
    border-radius: 5px;
    padding: 2px 6px;
    min-width: 38px;
    text-align: center;
  }

  .qty-control {
    display: flex;
    align-items: center;
    gap: 4px;
  }
  .qty-btn {
    width: 28px;
    height: 28px;
    border-radius: 7px;
    border: 1.5px solid var(--gray-border);
    background: white;
    font-size: 1.1rem;
    font-weight: 600;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--green-dark);
    transition: background 0.15s, border-color 0.15s;
    line-height: 1;
  }
  .qty-btn:active { background: var(--green-light); }
  .qty-btn.minus { color: var(--red); }
  .qty-num {
    min-width: 26px;
    text-align: center;
    font-size: 0.9rem;
    font-weight: 700;
    color: var(--text-dark);
  }

  /* BILL PANEL */
  #bill-panel { display: none; }
  #bill-panel.active { display: block; }

  .bill-table {
    width: 100%;
    border-collapse: collapse;
    background: white;
    border-radius: 12px;
    overflow: hidden;
    border: 1.5px solid var(--gray-border);
    font-size: 0.82rem;
  }
  .bill-table th {
    background: var(--green-dark);
    color: white;
    padding: 10px 12px;
    text-align: left;
    font-weight: 600;
    font-size: 0.76rem;
    text-transform: uppercase;
    letter-spacing: 0.4px;
  }
  .bill-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--green-light);
    vertical-align: middle;
  }
  .bill-table tr:last-child td { border-bottom: none; }
  .bill-table tr:hover td { background: var(--green-light); }
  .bill-table .subtotal {
    font-weight: 600;
    color: var(--green-dark);
  }
  .bill-table .remove-btn {
    background: none;
    border: none;
    color: var(--red);
    cursor: pointer;
    font-size: 1rem;
    padding: 2px 6px;
    border-radius: 5px;
  }
  .bill-table .remove-btn:hover { background: #ffeaea; }

  .grand-total-row {
    background: var(--green-dark);
    color: white;
    padding: 16px 12px;
    display: flex;
    justify-content: space-between;
    align-items: center;
    border-radius: 0 0 12px 12px;
    font-weight: 700;
    font-size: 1rem;
    margin-top: -1px;
  }
  .grand-total-row span:last-child {
    font-size: 1.4rem;
    color: #a3ffb8;
  }

  .empty-bill {
    text-align: center;
    padding: 48px 20px;
    color: var(--text-light);
  }
  .empty-bill svg { opacity: 0.3; margin-bottom: 10px; }
  .empty-bill p { font-size: 0.9rem; }

  /* ACTION BUTTONS */
  .action-bar {
    position: fixed;
    bottom: 0;
    left: 0; right: 0;
    background: white;
    padding: 12px 16px;
    border-top: 2px solid var(--gray-border);
    display: flex;
    gap: 10px;
    max-width: 800px;
    margin: 0 auto;
    z-index: 100;
  }
  .btn-primary {
    flex: 1;
    background: var(--green-dark);
    color: white;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-primary:hover { background: var(--green-mid); }

  .btn-secondary {
    flex: 1;
    background: white;
    color: var(--red);
    border: 2px solid var(--red);
    border-radius: 10px;
    padding: 13px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-secondary:hover { background: #fff0f0; }

  .btn-print {
    flex: 1;
    background: var(--gold);
    color: #5a3e00;
    border: none;
    border-radius: 10px;
    padding: 13px;
    font-size: 0.9rem;
    font-weight: 700;
    cursor: pointer;
    transition: background 0.2s;
  }
  .btn-print:hover { background: #f9b825; }

  /* PRINT */
  @media print {
    header, .tabs, .action-bar, #products-panel { display: none !important; }
    #bill-panel { display: block !important; }
    body { background: white; }
    .bill-table th { background: black !important; -webkit-print-color-adjust: exact; }
  }

  /* NOTICE */
  .notice {
    background: var(--green-light);
    border: 1.5px solid var(--green-accent);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.8rem;
    color: var(--green-dark);
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 8px;
  }
</style>
</head>

</main>

<div class="action-bar" id="action-bar-products">

// STATE: qty[productId][variant] = number
const state = {};
PRODUCTS.forEach(p => { state[p.id] = { pouch: 0, bottle: 0 }; });

// RENDER PRODUCTS
function buildProducts() {
  const panel = document.getElementById('products-panel');
  const notice = panel.querySelector('.notice');

  SECTIONS.forEach(sec => {
    const head = document.createElement('div');
    head.className = 'section-head';
    head.textContent = sec.label;
    panel.appendChild(head);

    sec.ids.forEach(id => {
      const p = PRODUCTS.find(x => x.id === id);
      if (!p) return;
      const card = document.createElement('div');
      card.className = 'product-card';
      card.id = 'card-' + id;

      const hasPouch  = p.pouch  != null;
      const hasBottle = p.bottle != null;

      card.innerHTML = `
        <div class="product-name">
          <span class="gu">${p.gu}</span>
          <span class="en">${p.en}${p.note ? ' · '+p.note : ''}</span>
        </div>
        <div class="variant-group">
          ${hasPouch ? `
          <div class="variant-row">
            <span class="variant-label" style="color:#1a6b2f">પાઉચ</span>
            <span class="price-tag">₹${p.pouch}</span>
            <div class="qty-control">
              <button class="qty-btn minus" onclick="changeQty('${id}','pouch',-1)">−</button>
              <span class="qty-num" id="qty-${id}-pouch">0</span>
              <button class="qty-btn plus" onclick="changeQty('${id}','pouch',1)">+</button>
            </div>
          </div>` : ''}
          ${hasBottle ? `
          <div class="variant-row">
            <span class="variant-label" style="color:#1e5ba8">બોટલ</span>
            <span class="price-tag" style="background:#e8f0fa;color:#1e5ba8">₹${p.bottle}</span>
            <div class="qty-control">
              <button class="qty-btn minus" onclick="changeQty('${id}','bottle',-1)">−</button>
              <span class="qty-num" id="qty-${id}-bottle">0</span>
              <button class="qty-btn plus" onclick="changeQty('${id}','bottle',1)">+</button>
            </div>
          </div>` : ''}
          ${!hasPouch && !hasBottle ? `<span style="font-size:0.75rem;color:#aaa">ભાવ ઉપલબ્ધ નથી</span>` : ''}
        </div>
      `;
      panel.appendChild(card);
    });
  });
}

function changeQty(id, variant, delta) {
  state[id][variant] = Math.max(0, state[id][variant] + delta);
  document.getElementById(`qty-${id}-${variant}`).textContent = state[id][variant];
  const p = PRODUCTS.find(x => x.id === id);
  const totalQty = (p.pouch != null ? state[id].pouch : 0) + (p.bottle != null ? state[id].bottle : 0);
  document.getElementById('card-' + id).classList.toggle('has-qty', totalQty > 0);
  updateTotals();
}

function calcTotal() {
  let total = 0;
  PRODUCTS.forEach(p => {
    if (p.pouch  != null) total += state[p.id].pouch  * p.pouch;
    if (p.bottle != null) total += state[p.id].bottle * p.bottle;
  });
  return total;
}

function updateTotals() {
  const total = calcTotal();
  document.getElementById('header-total').textContent = '₹' + total;

  let count = 0;
  PRODUCTS.forEach(p => {
    if (state[p.id].pouch  > 0) count++;
    if (state[p.id].bottle > 0) count++;
  });
  document.getElementById('item-count').textContent = count;
}

function renderBill() {
  const tbody = document.getElementById('bill-tbody');
  tbody.innerHTML = '';

  const rows = [];
  PRODUCTS.forEach(p => {
    if (p.pouch  != null && state[p.id].pouch  > 0) rows.push({ name: p.gu, type: 'પાઉચ', price: p.pouch,  qty: state[p.id].pouch,  id: p.id, variant: 'pouch' });
    if (p.bottle != null && state[p.id].bottle > 0) rows.push({ name: p.gu, type: 'બોટલ', price: p.bottle, qty: state[p.id].bottle, id: p.id, variant: 'bottle' });
  });

  const empty = document.getElementById('empty-msg');
  const table = document.getElementById('bill-table');
  const bar   = document.getElementById('grand-total-bar');

  if (rows.length === 0) {
    empty.style.display = 'block';
    table.style.display = 'none';
    bar.style.display   = 'none';
    return;
  }

  empty.style.display = 'none';
  table.style.display = 'table';
  bar.style.display   = 'flex';

  rows.forEach(r => {
    const subtotal = r.price * r.qty;
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${r.name}</td>
      <td><span style="font-size:0.72rem;background:${r.variant==='pouch'?'#e8f5ec':'#e8f0fa'};color:${r.variant==='pouch'?'#1a6b2f':'#1e5ba8'};padding:2px 7px;border-radius:5px;font-weight:600">${r.type}</span></td>
      <td>₹${r.price}</td>
      <td><b>${r.qty}</b></td>
      <td class="subtotal">₹${subtotal}</td>
      <td><button class="remove-btn" onclick="removeItem('${r.id}','${r.variant}')">✕</button></td>
    `;
    tbody.appendChild(tr);
  });

  const total = calcTotal();
  document.getElementById('grand-total-val').textContent = '₹' + total;
}

function removeItem(id, variant) {
  state[id][variant] = 0;
  const el = document.getElementById(`qty-${id}-${variant}`);
  if (el) el.textContent = '0';
  const p = PRODUCTS.find(x => x.id === id);
  const totalQty = (p.pouch != null ? state[id].pouch : 0) + (p.bottle != null ? state[id].bottle : 0);
  const card = document.getElementById('card-' + id);
  if (card) card.classList.toggle('has-qty', totalQty > 0);
  updateTotals();
  renderBill();
}

function clearAll() {
  if (!confirm('બધો ડેટા સાફ કરવો છે?')) return;
  PRODUCTS.forEach(p => { state[p.id] = { pouch: 0, bottle: 0 }; });
  document.querySelectorAll('.qty-num').forEach(el => el.textContent = '0');
  document.querySelectorAll('.product-card').forEach(c => c.classList.remove('has-qty'));
  updateTotals();
  renderBill();
}

function printBill() {
  renderBill();
  window.print();
}

function showTab(tab) {
  document.querySelectorAll('.tab-btn').forEach((b,i) => b.classList.toggle('active', (i===0&&tab==='products')||(i===1&&tab==='bill')));
  document.getElementById('products-panel').style.display = tab === 'products' ? '' : 'none';
  document.getElementById('bill-panel').classList.toggle('active', tab === 'bill');
  document.getElementById('action-bar-products').style.display = tab === 'products' ? 'flex' : 'none';
  document.getElementById('action-bar-bill').style.display     = tab === 'bill'     ? 'flex' : 'none';
  if (tab === 'bill') renderBill();
}

// Set date
function setDate() {
  const now = new Date();
  const opts = { weekday:'long', year:'numeric', month:'long', day:'numeric' };
  document.getElementById('header-date').textContent = now.toLocaleDateString('gu-IN', opts);
}

// INIT
buildProducts();
setDate();
</script>
</body>
</html>
